services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_MODEL=llama3.2
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama_entrypoint.sh:/ollama_entrypoint.sh
    entrypoint: ["/bin/bash", "/ollama_entrypoint.sh"]
    deploy:
      resources:
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q '${OLLAMA_MODEL:-llama3.2}'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
      - EMBEDDING_MODEL=intfloat/multilingual-e5-small
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - chroma_data:/app/data/chroma_db

volumes:
  ollama_data:
  chroma_data:
